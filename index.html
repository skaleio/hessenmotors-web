    <!-- Meta Pixel: carga diferida para no bloquear el renderizado -->
    <script>
      window._fbqId = '1412183870528990';
      function _loadMetaPixel() {
        if (window.fbq) return;
        var n = window.fbq = function(){ n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments) };
        if (!window._fbq) window._fbq = n;
        n.push = n; n.loaded = true; n.version = '2.0'; n.queue = [];
        var t = document.createElement('script'); t.async = true;
        t.src = 'https://connect.facebook.net/en_US/fbevents.js';
        var s = document.getElementsByTagName('script')[0]; s.parentNode.insertBefore(t, s);
        fbq('init', window._fbqId);
        fbq('track', 'PageView');
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(_loadMetaPixel, { timeout: 3000 });
      } else {
        setTimeout(_loadMetaPixel, 2000);
      }
    </script>
    <!-- End Meta Pixel Code -->
